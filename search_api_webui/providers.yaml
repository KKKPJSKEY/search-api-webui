querit:
  url: "https://api.querit.ai/v1/search"
  method: "POST"
  headers:
    "Accept": "application/json"
    "Authorization": "Bearer {api_key}"
    "Content-Type": "application/json"
  payload:
    query: "{query}"
  response_mapping:
    root_path: "results.result"
    server_latency_path: "took"
    fields:
      title: "title"
      url: "url"
      snippet: "snippet"

you:
  url: "https://ydc-index.io/v1/search"
  method: "GET"
  headers:
    X-API-Key: "{api_key}"
  params:
    query: "{query}"
  payload: {}
  response_mapping:
    root_path: "results.web"
    server_latency_path: "metadata.latency"
    fields:
      title: "title"
      url: "url"
      snippet: "snippets[0] || description"

brave:
  url: "https://api.search.brave.com/res/v1/web/search"
  method: "GET"
  headers:
    X-Subscription-Token: "{api_key}"
    Accept: "application/json"
  params:
    q: "{query}"
  payload: {}
  response_mapping:
    root_path: "web.results"
    fields:
      title: "title"
      url: "url"
      snippet: "description"

exa:
  url: "https://api.exa.ai/search"
  method: "POST"
  headers:
    "Content-Type": "application/json"
    "x-api-key": "{api_key}"
  params: {}
  payload:
    query: "{query}"
  response_mapping:
    root_path: "results"
    fields:
      title: "title"
      url: "url"
      snippet: "text"

querit_sdk:
  type: "querit_sdk"
  description: "Official Querit Search via Python SDK"
  default_limit: 10
