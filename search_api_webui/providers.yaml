querit:
  url: "https://api.querit.ai/v1/search"
  api_key_url: "https://www.querit.ai/en/dashboard/api-keys"
  method: "POST"
  headers:
    "Accept": "application/json"
    "Authorization": "Bearer {api_key}"
    "Content-Type": "application/json"
  payload:
    query: "{query}"
    count: "{limit}"
  advanced_payload_tpl:
    count: 5
    chunksPerDoc: 1
    filters:
      sites:
        include: []
        exclude: []
      timeRange:
        date: ""
      geo:
        countries:
          include: []
      languages:
        include: []
  response_mapping:
    root_path: "results.result"
    server_latency_path: "took"
    fields:
      url: "url"
      title: "title"
      site_name: "site_name"
      site_icon: "site_icon"
      page_age: "page_age"
      snippet: "snippet"

you:
  url: "https://ydc-index.io/v1/search"
  api_key_url: "https://you.com/platform"
  method: "GET"
  headers:
    X-API-Key: "{api_key}"
  params:
    query: "{query}"
    count: "{limit}"
  payload: {}
  advanced_params_tpl:
    count: 5
    freshness: "week"
    offset: 0
    country: ""
    language: ""
    safesearch: "off"
    livecrawl: ""
    livecrawl_formats: ""
    crawl_timeout: 10
  response_mapping:
    root_path: "results.web"
    server_latency_path: "metadata.latency"
    fields:
      url: "url"
      title: "title"
      site_icon: "favicon_url"
      page_age: "page_age"
      snippet: "snippets[0] || description"

tavily:
  url: "https://api.tavily.com/search"
  api_key_url: "https://app.tavily.com"
  method: "POST"
  headers:
    "Accept": "application/json"
    "Content-Type": "application/json"
  payload:
    api_key: "{api_key}"
    query: "{query}"
    max_results: "{limit}"
    search_depth: "basic"
    include_favicon: "true"
  advanced_payload_tpl:
    max_results: 5
    search_depth: ""
    chunks_per_source: 1
    include_domains: []
    exclude_domains: []
    include_favicon: "true"
    topic: "general"
    start_date: ""
    end_date: ""
    country: ""
  response_mapping:
    root_path: "results"
    server_latency_path: "response_time"
    fields:
      url: "url"
      title: "title"
      page_age: "published_date"
      site_icon: "favicon"
      snippet: "content"

exa:
  url: "https://api.exa.ai/search"
  api_key_url: "https://dashboard.exa.ai"
  method: "POST"
  headers:
    "Content-Type": "application/json"
    "x-api-key": "{api_key}"
  params: {}
  payload:
    query: "{query}"
    numResults: "{limit}"
    type: "auto"
  advanced_payload_tpl:
    numResults: 5
    type: "auto"
    useAutoprompt: true
    includeDomains: []
    excludeDomains: []
    startCrawlDate: ""
    endCrawlDate: ""
    startPublishedDate: ""
    endPublishedDate: ""
  response_mapping:
    root_path: "results"
    fields:
      url: "url"
      title: "title"
      site_icon: "favicon"
      page_age: "publishedDate"
      snippet: "text"

parallel:
  url: "https://api.parallel.ai/v1beta/search"
  api_key_url: "https://platform.parallel.ai/settings?tab=api-keys"
  method: "POST"
  headers:
    "Content-Type": "application/json"
    "x-api-key": "{api_key}"
    "parallel-beta": "search-extract-2025-10-10"
  payload:
    mode: "one-shot"
    max_results: "{limit}"
    objective: "{query}"
  advanced_payload_tpl:
    mode: "one-shot"
    max_results: "{limit}"
  response_mapping:
    root_path: "results"
    fields:
      url: "url"
      title: "title"
      page_age: "publish_date"

baidu:
  url: "https://qianfan.baidubce.com/v2/ai_search/web_search"
  api_key_url: "https://console.bce.baidu.com/qianfan/ais/console/apiKey"
  method: "POST"
  headers:
    "Accept": "application/json"
    "Authorization": "Bearer {api_key}"
    "Content-Type": "application/json"
  payload:
    messages:
      - content: "{query}"
        role: "user"
    search_source: "baidu_search_v2"
    resource_type_filter:
      - type: "web"
        top_k: "{limit}"
  advanced_payload_tpl:
    search_filter:
      match:
        site: []
    search_recency_filter: ""
    search_source: "baidu_search_v2"
    resource_type_filter:
      - type: "web"
        top_k: "5"
  response_mapping:
    root_path: "references"
    fields:
      url: "url"
      title: "title"
      site_name: "website"
      site_icon: "icon"
      page_age: "date"
      snippet: "abstract"

brave:
  url: "https://api.search.brave.com/res/v1/web/search"
  api_key_url: "https://brave.com/search/api"
  method: "GET"
  headers:
    X-Subscription-Token: "{api_key}"
    Accept: "application/json"
  params:
    q: "{query}"
    count: "{limit}"
  payload: {}
  advanced_params_tpl:
    count: 5
    offset: 0
    country: "US"
    search_lang: "en"
    freshness: ""
    result_filter: "web"
    safesearch: off
  response_mapping:
    root_path: "web.results"
    fields:
      url: "url"
      title: "title"
      page_age: "page_age"
      snippet: "description"

serper:
  url: "https://google.serper.dev/search"
  api_key_url: "https://serper.dev"
  method: "POST"
  headers:
    "X-API-KEY": "{api_key}"
    "Content-Type": "application/json"
  params: {}
  payload:
    q: "{query}"
    num: "{limit}"
  advanced_payload_tpl:
    num: 5
  response_mapping:
    root_path: "organic"
    fields:
      url: "link"
      title: "title"
      snippet: "snippet"

anysearch:
  url: "https://api.anysearch.com/v1/search"
  api_key_url: "https://anysearch.com"
  method: "POST"
  headers:
    "Accept": "application/json"
    "Authorization": "Bearer {api_key}"
    "Content-Type": "application/json"
  payload:
    query: "{query}"
    max_results: "{limit}"
  advanced_payload_tpl:
    max_results: 10
    domains: []
    tags: []
    content_types: []
    zone: ""
    language: ""
    providers: []
    constraint:
      freshness: ""
      from: ""
      to: ""
  response_mapping:
    root_path: "data.results"
    server_latency_path: "data.metadata.search_time_ms"
    fields:
      url: "url"
      title: "title"
      page_age: "published_at"
      snippet: "snippet"
