name: Build Wheel and Mac App

permissions:
  contents: write

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_dmg:
        description: 'Build macOS DMG (in addition to wheel)'
        type: boolean
        required: false
        default: false

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    # Only run DMG build if:
    # 1. Push to a tag (v*) OR
    # 2. Manual trigger with build_dmg=true
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_dmg == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15  # M1 runner for native arm64 builds
          - arch: x86_64
            runner: macos-15-intel  # Intel runner for native x86_64 builds

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Python virtual environment
        uses: actions/cache@v4
        with:
          path: venv-macos-build
          key: ${{ runner.os }}-${{ matrix.arch }}-python-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-python-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies and build
        run: |
          chmod +x scripts/build_macos_app.sh
          ./scripts/build_macos_app.sh ${{ matrix.arch }}

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Create DMG
        run: |
          chmod +x scripts/create_dmg.sh
          ./scripts/create_dmg.sh ${{ matrix.arch }}

      - name: List built files
        run: |
          echo "Files in dist/:"
          ls -lh dist/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SearchAPIWebUI-${{ steps.get_version.outputs.version }}-macOS-${{ matrix.arch }}
          path: dist/SearchAPIWebUI-${{ steps.get_version.outputs.version }}-macOS-${{ matrix.arch }}.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SearchAPIWebUI-${{ steps.get_version.outputs.version }}-macOS-${{ matrix.arch }}.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-python-wheel:
    name: Build Python Wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatchling build

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build wheel package
        run: |
          python -m build --wheel

      - name: List built files
        run: |
          echo "Files in dist/:"
          ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: search_api_webui-${{ steps.get_version.outputs.version }}-wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  add-release-notes:
    name: Add Release Notes
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create release notes
        run: |
          mkdir -p dist
          cat > dist/RELEASE_NOTES.txt << 'EOF'
          Search API WebUI - Release

          ## Python Package
          - search_api_webui-{version}-py3-none-any.whl: Universal Python wheel package (cross-platform)

          ## macOS Distribution
          - SearchAPIWebUI-macOS-arm64.dmg: For Apple Silicon (M1/M2/M3) Macs
          - SearchAPIWebUI-macOS-x86_64.dmg: For Intel Macs

          ### Installation
          Python package:
            pip install search_api_webui-{version}-py3-none-any.whl

          macOS app:
            Download and install the appropriate DMG for your system.

          Apple Silicon users should use the arm64 version for best performance.
          Intel Mac users should use the x86_64 version.

          Note: arm64 version can run on Intel Macs via Rosetta 2, but may have reduced performance.
          EOF

          echo "Created release notes"

      - name: Upload release notes
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/RELEASE_NOTES.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
