name: Build Release Packages

permissions:
  contents: write

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_wheel:
        description: 'Build Python Wheel'
        type: boolean
        required: false
        default: false
      build_dmg:
        description: 'Build macOS DMG'
        type: boolean
        required: false
        default: false
      build_windows:
        description: 'Build Windows installer'
        type: boolean
        required: false
        default: false
      build_android:
        description: 'Build Android APK'
        type: boolean
        required: false
        default: false

jobs:
  # Step 1: Build Python Wheel (foundation package)
  build-python-wheel:
    name: Build Python Wheel
    runs-on: ubuntu-latest
    # Only run wheel build if:
    # 1. Push to a tag (v*) OR
    # 2. Manual trigger with build_wheel=true
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_wheel == 'true')
    permissions:
      contents: write
      id-token: write  # Required for trusted publishing to PyPI
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install npm dependencies and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatchling build

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build wheel package
        run: |
          python -m build --wheel

      - name: List built files
        run: |
          echo "Files in dist/:"
          ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: search_api_webui-${{ steps.get_version.outputs.version }}-wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: false

  # Step 2: Build Platform Packages (parallel)
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: [build-python-wheel]
    # Only run DMG build if:
    # 1. Push to a tag (v*) OR
    # 2. Manual trigger with build_dmg=true
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_dmg == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15  # M1 runner for native arm64 builds
          - arch: x86_64
            runner: macos-15-intel  # Intel runner for native x86_64 builds

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Python virtual environment
        uses: actions/cache@v4
        with:
          path: venv-dev
          key: ${{ runner.os }}-${{ matrix.arch }}-python-${{ hashFiles('pyproject.toml') }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-${{ matrix.arch }}-node-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install dependencies and build
        run: |
          chmod +x scripts/build_macos_app.sh
          ./scripts/build_macos_app.sh ${{ matrix.arch }}

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Create DMG
        run: |
          chmod +x scripts/create_dmg.sh
          sync && sleep 3
          ./scripts/create_dmg.sh ${{ matrix.arch }}

      - name: List built files
        run: |
          echo "Files in dist/:"
          ls -lh dist/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SearchAPIWebUI-${{ steps.get_version.outputs.version }}-macOS-${{ matrix.arch }}
          path: dist/SearchAPIWebUI-${{ steps.get_version.outputs.version }}-macOS-${{ matrix.arch }}.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SearchAPIWebUI-${{ steps.get_version.outputs.version }}-macOS-${{ matrix.arch }}.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows ${{ matrix.arch }}
    runs-on: windows-latest
    needs: [build-python-wheel]
    # Only run Windows build if:
    # 1. Push to a tag (v*) OR
    # 2. Manual trigger with build_windows=true
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_windows == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
          - arch: x86

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Python virtual environment
        uses: actions/cache@v4
        with:
          path: venv-dev
          key: ${{ runner.os }}-${{ matrix.arch }}-python-${{ hashFiles('pyproject.toml') }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-${{ matrix.arch }}-node-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install dependencies and build
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          set -e
          echo "Python version:"
          python --version
          echo "Python location:"
          which python
          echo ""
          chmod +x scripts/build_windows_app.sh
          ./scripts/build_windows_app.sh ${{ matrix.arch }}

      - name: Get version from pyproject.toml
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Sign Windows Application
        shell: powershell
        env:
          CI: true
        run: |
          $certBase64 = "${{ secrets.CERTIFICATE_BASE64 }}"
          $certPassword = "${{ secrets.CERTIFICATE_PASSWD }}"

          if ($certBase64 -and $certPassword) {
            Write-Host "Using certificate from GitHub Secrets"
            powershell -ExecutionPolicy Bypass -File ./scripts/sign_windows_app.ps1 -AppPath "dist/SearchAPIWebUI/SearchAPIWebUI.exe" -CertificateBase64 $certBase64 -CertificatePassword $certPassword -ExportCert
          } else {
            Write-Host "Warning: Certificate secrets not found, creating new self-signed certificate"
            powershell -ExecutionPolicy Bypass -File ./scripts/sign_windows_app.ps1 -AppPath "dist/SearchAPIWebUI/SearchAPIWebUI.exe" -ExportCert
          }

      - name: Create Windows Installer
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File ./scripts/create_installer.ps1 -Arch ${{ matrix.arch }}

      - name: Sign Windows Installer
        shell: powershell
        env:
          CI: true
        run: |
          $version = (Select-String -Path pyproject.toml -Pattern 'version\s*=\s*"([^"]+)"').Matches.Groups[1].Value
          $installerPath = "dist/SearchAPIWebUI-$version-Windows-${{ matrix.arch }}-Setup.exe"

          $certBase64 = "${{ secrets.CERTIFICATE_BASE64 }}"
          $certPassword = "${{ secrets.CERTIFICATE_PASSWD }}"

          if ($certBase64 -and $certPassword) {
            Write-Host "Using certificate from GitHub Secrets"
            powershell -ExecutionPolicy Bypass -File ./scripts/sign_windows_app.ps1 -AppPath $installerPath -CertificateBase64 $certBase64 -CertificatePassword $certPassword
          } else {
            Write-Host "Warning: Certificate secrets not found, creating new self-signed certificate"
            powershell -ExecutionPolicy Bypass -File ./scripts/sign_windows_app.ps1 -AppPath $installerPath
          }

      - name: List built files
        shell: bash
        run: |
          echo "Files in dist/:"
          ls -lh dist/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SearchAPIWebUI-${{ steps.get_version.outputs.version }}-Windows-${{ matrix.arch }}
          path: dist/SearchAPIWebUI-${{ steps.get_version.outputs.version }}-Windows-${{ matrix.arch }}-Setup.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SearchAPIWebUI-${{ steps.get_version.outputs.version }}-Windows-${{ matrix.arch }}-Setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [build-python-wheel]
    # Only run APK build if:
    # 1. Push to a tag (v*) OR
    # 2. Manual trigger with build_android=true
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_android == 'true')

    container:
      image: kivy/buildozer:latest
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}

      - name: Cache Buildozer global directory
        id: cache-buildozer-global
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Cache Buildozer local directory
        if: steps.cache-buildozer-global.outputs.cache-hit == 'true'
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ hashFiles('buildozer.spec') }}

      - name: Install npm dependencies and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Verify frontend build
        run: |
          echo "Checking frontend/dist directory:"
          ls -la frontend/dist/

      - name: Build release APK with build_android_apk.sh
        run: |
          # Decode keystore from GitHub Secrets
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          echo "Keystore created at: $(pwd)/release.keystore"
          ls -lh release.keystore

          # Build APK
          chmod +x scripts/build_android_apk.sh
          ./scripts/build_android_apk.sh release
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          MAKEFLAGS: -j4
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Verify AndroidManifest.xml
        run: |
          MANIFEST=$(find .buildozer/android/platform/build-*/dists/*/src/main/AndroidManifest.xml 2>/dev/null | head -1)
          [ -f "$MANIFEST" ] && grep -q 'usesCleartextTraffic="true"' "$MANIFEST" || exit 1

      - name: List built files
        run: |
          echo "Files in bin/:"
          ls -lh bin/ || echo "No bin directory found"
          echo ""
          echo "Files in .buildozer/android/platform/build-*/output:"
          find .buildozer/android/platform -name "*.apk" -type f || echo "No APK files found"

      - name: Find and rename APK
        id: find_apk
        run: |
          # Get version for APK naming
          VERSION=$(grep -E '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

          # Find the APK file
          APK_PATH=$(find .buildozer/android/platform/build-*/output -name "*.apk" -type f | head -1)

          if [ -z "$APK_PATH" ]; then
            # Fallback: check bin directory
            APK_PATH=$(find bin -name "*.apk" -type f | head -1)
          fi

          if [ -z "$APK_PATH" ]; then
            echo "Error: No APK file found!"
            exit 1
          fi

          echo "Found APK at: $APK_PATH"

          # Create bin directory if it doesn't exist
          mkdir -p bin

          # Copy and rename APK
          NEW_NAME="bin/SearchAPIWebUI-${VERSION}-android-release.apk"
          cp "$APK_PATH" "$NEW_NAME"

          echo "apk_path=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "Renamed APK to: $NEW_NAME"

          # Show APK info
          ls -lh "$NEW_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SearchAPIWebUI-${{ steps.find_apk.outputs.version }}-android
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Step 3: Add Release Notes (after all builds complete)
  add-release-notes:
    name: Add Release Notes
    needs: [build-macos, build-python-wheel, build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create release notes
        run: |
          mkdir -p dist
          VERSION="${{ steps.get_version.outputs.version }}"
          cat > dist/RELEASE_NOTES.txt << EOF
          Search API WebUI - Release $VERSION

          ### Downloads

          **Python Package:**
          - search_api_webui-$VERSION-py3-none-any.whl

          **macOS:**
          - SearchAPIWebUI-$VERSION-macOS-arm64.dmg (Apple Silicon)
          - SearchAPIWebUI-$VERSION-macOS-x86_64.dmg (Intel)

          **Windows:**
          - SearchAPIWebUI-$VERSION-Windows-x64-Setup.exe (64-bit)
          - SearchAPIWebUI-$VERSION-Windows-x86-Setup.exe (32-bit)

          **Android:**
          - SearchAPIWebUI-$VERSION-android-release.apk

          EOF

          echo "Created release notes for version $VERSION"

      - name: Upload release notes
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/RELEASE_NOTES.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
